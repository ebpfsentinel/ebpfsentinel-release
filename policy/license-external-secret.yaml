# Per-customer license delivery — the ONLY per-customer artifact.
#
# Everything else (images, charts, binaries, the measurements manifest) is
# public + signed and identical for every customer. The license key is the
# single secret that differs, so it is delivered out-of-band as a Kubernetes
# Secret and mounted by the agent (enterprise reads it at `--license` /
# `enterprise.license_path`).
#
# Two supported patterns — pick ONE:
#
# ── A. External Secrets Operator (ESO) — secret stays in your vault ────────
# The license lives in your own secret backend (Vault / AWS Secrets Manager /
# GCP SM / Azure KV); ESO syncs it into the namespace. Nothing sensitive is
# committed to Git. Requires ESO installed and a SecretStore configured.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ebpfsentinel-license
  namespace: ebpfsentinel
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: ebpfsentinel-vault # your SecretStore/ClusterSecretStore
    kind: ClusterSecretStore
  target:
    name: ebpfsentinel-license # -> the k8s Secret the agent mounts
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        # The agent expects the 3-line dual-signed license at this key.
        license.key: "{{ .license }}"
  data:
    - secretKey: license
      remoteRef:
        key: ebpfsentinel/enterprise-license # path in your vault
        property: license.key
---
# ── B. SOPS-encrypted Secret in Git (GitOps-native) ───────────────────────
# If you prefer the license to live in Git, commit it SOPS-encrypted and let
# Flux's kustomize-controller (or Argo + KSOPS) decrypt at apply time. The
# plaintext below is a TEMPLATE — never commit it un-encrypted; run
# `sops --encrypt --in-place license-secret.yaml` first.
apiVersion: v1
kind: Secret
metadata:
  name: ebpfsentinel-license
  namespace: ebpfsentinel
type: Opaque
stringData:
  # Replace with the customer's issued 3-line license, then SOPS-encrypt.
  license.key: |
    <base64-payload>
    <base64-ed25519-signature>
    <base64-ml-dsa-signature>
